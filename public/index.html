<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<title>5x5 Online Game</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

<h2>Magacaaga gali:</h2>
<input type="text" id="nameInput" placeholder="Guest">
<button onclick="joinGame()">Bilaab</button>

<h2>Ciyaarta Godadka 5x5</h2>
<p id="status">Connecting...</p>
<div id="board"></div>

<script>
const socket = io("http://localhost:3000"); // Haddii online: replace URL
let board = [];
let currentPlayer = "red";

const boardDiv = document.getElementById("board");
const status = document.getElementById("status");

function joinGame() {
  const name = document.getElementById("nameInput").value || "Guest";
  socket.emit("join", name);
}

socket.on("init", (data) => {
  board = data.board;
  currentPlayer = data.currentPlayer;
  drawBoard();
});

socket.on("update", (data) => {
  board = data.board;
  currentPlayer = data.currentPlayer;
  drawBoard();
});

function drawBoard() {
  boardDiv.innerHTML = "";
  board.forEach((cell, i) => {
    const div = document.createElement("div");
    div.className = "cell";
    if (cell) div.classList.add(cell);
    div.onclick = () => handleClick(i);
    boardDiv.appendChild(div);
  });
  status.innerText = `Current turn: ${currentPlayer}`;
}

function handleClick(i) {
  if (!board[i]) socket.emit("place", i);
}
</script>
</body>
</html>
