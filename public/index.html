<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<title>5x5 Online Game</title>
<style>
body{font-family:Arial;text-align:center;margin-top:20px;}
#board{display:grid;grid-template-columns:repeat(5,80px);gap:10px;justify-content:center;}
.cell{width:80px;height:80px;border:2px solid black;border-radius:50%;cursor:pointer;}
.red{background:red;}
.blue{background:blue;}
.selected{outline:4px solid yellow;}
.move{background:#90ee90;}
</style>
</head>
<body>
<h2>5x5 Online Game</h2>
<p id="status">Connecting...</p>
<div id="board"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let playerColor = null;
let board = [];
let currentPlayer = null;
const boardDiv = document.getElementById("board");
const status = document.getElementById("status");
let selected = null;

// Receive assigned color
socket.on("color", (color) => {
  playerColor = color;
  status.innerText = `You are ${color}`;
});

// Full server
socket.on("full", () => alert("Server full!"));

socket.on("board", (b, turn) => {
  board = b;
  currentPlayer = turn;
  draw();
});

function draw() {
  boardDiv.innerHTML = "";
  for (let i = 0; i < board.length; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";
    if (board[i] === "red") cell.classList.add("red");
    if (board[i] === "blue") cell.classList.add("blue");
    if (i === selected) cell.classList.add("selected");
    cell.onclick = () => clickCell(i);
    boardDiv.appendChild(cell);
  }
  status.innerText = `You are ${playerColor} | Turn: ${currentPlayer}`;
}

function clickCell(i) {
  if (!playerColor || playerColor !== currentPlayer) return;
  if (selected === null && board[i] === playerColor) {
    selected = i;
    draw();
  } else if (selected !== null && board[i] === null) {
    socket.emit("move", { from: selected, to: i, color: playerColor });
    selected = null;
  }
}
</script>
</body>
</html>
